<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المبيعات والكاشير</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-header {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-back {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .main-title { margin-top: 15px; color: #333; }
        .subtitle { color: #666; font-size: 14px; }
        .content-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }
        .box {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 280px;
            text-align: center;
        }
        .products-box { border-top: 4px solid #007bff; }
        .invoice-box { border-top: 4px solid #28a745; }
        .btn-prod {
            display: inline-block;
            width: 45%;
            margin: 5px;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .coffee { background-color: #6f4e37; }
        .tea { background-color: #dc3545; }
        .water { background-color: #17a2b8; }
        .cake { background-color: #e83e8c; }
        .total-text { color: #28a745; font-size: 22px; font-weight: bold; margin: 20px 0; }
        .btn-confirm {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="btn-back">📊 العودة للبوابة الرئيسية</a>
    <h1 class="main-title">شاشة المبيعات والكاشير 🛒</h1>
    <p class="subtitle">اضغطي على المنتجات لتسجيل الفاتورة وحساب الإجمالي فوراً</p>
</div>

<div class="content-wrapper">
    <!-- صندوق المنتجات -->
    <div class="box products-box">
        <h3>المنتجات المتوفرة</h3>
        <button class="btn-prod coffee">☕ قهوة (50 ج.م)</button>
        <button class="btn-prod tea">🍓 شاي (20 ج.م)</button>
        <button class="btn-prod water">💧 مياه (10 ج.م)</button>
        <button class="btn-prod cake">🍰 كيك (40 ج.م)</button>
    </div>

    <!-- صندوق الفاتورة -->
    <div class="box invoice-box">
        <h3>الفاتورة الحالية 📄</h3>
        <hr style="border: 0; border-top: 1px dashed #ccc;">
        <div class="total-text">الإجمالي: 0 ج.م</div>
        <button class="btn-confirm">تأكيد عملية البيع ✓</button>
    </div>
</div>

</body>
</html>
