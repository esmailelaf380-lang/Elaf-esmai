<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في نظامك البرمجي</title>
    <style>

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-blue { background-color: #007bff; }
        .btn-green { background-color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في نظامك البرمجي 🚀</h1>
    <p>الرجاء اختيار الشاشة التي ترغبين في الدخول إليها:</p>
    
    <a href="dashboard.html" class="btn btn-blue">📊 الدخول إلى شاشة التحكم</a>
    <a href="Sales.html" class="btn btn-green">🛒 الدخول إلى شاشة المبيعات</a>

</html>
